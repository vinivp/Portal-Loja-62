<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09213d" />
    <title>Página não encontrada | Portal Loja 62</title>
    <style>
      * { box-sizing: border-box; }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #17212f;
        background:
          linear-gradient(rgba(9, 33, 61, 0.82), rgba(9, 33, 61, 0.92)),
          url('/imagem/frente01loja62.png') center / cover;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(100%, 560px);
        padding: 34px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.3);
        text-align: center;
      }
      img {
        width: 70px;
        height: 70px;
        object-fit: contain;
        margin-bottom: 16px;
        padding: 7px;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
      }
      .code {
        margin: 0;
        color: #b3202b;
        font-size: 88px;
        line-height: 1;
        font-weight: 900;
      }
      h1 {
        margin: 12px 0 8px;
        color: #09213d;
        font-size: 28px;
      }
      p {
        margin: 0 0 24px;
        color: #657184;
        line-height: 1.55;
      }
      a {
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 18px;
        border-radius: 8px;
        color: #ffffff;
        background: #09213d;
        font-weight: 800;
        text-decoration: none;
      }
      a:hover { background: #b3202b; }
      @media (max-width: 520px) {
        main { padding: 26px 20px; }
        .code { font-size: 68px; }
        h1 { font-size: 23px; }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/imagem/LogoApp.png" alt="Logo Portal Loja 62" />
      <p class="code">404</p>
      <h1>Página não encontrada</h1>
      <p>O endereço acessado não existe ou foi removido do Portal Loja 62.</p>
      <a href="/">Voltar para o portal</a>
    </main>
  </body>
</html>
